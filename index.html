<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-blue-500 via-sky-200 to-blue-300 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg">

        <!-- Title -->
        <h1 class="text-3xl font-bold text-slate-700 mb-6 flex justify-center items-center gap-2">
            <i class="ri-cloud-line text-sky-500"></i>
            User Dashboard
        </h1>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-sky-200">

            <table class="w-full">

                <!-- Header -->
                <thead class="bg-sky-50 border-b border-sky-200">
                    <tr class="text-blue-900 text-sm uppercase tracking-wide">
                        <th class="p-4 text-left">
                            <div class="flex items-center justify-center gap-2 group">
                                <i class="ri-user-line text-sky-600 transition group-hover:scale-110"></i>
                                Name
                            </div>
                        </th>
                        <th class="p-4 text-left">
                            <div class="flex items-center justify-center gap-2 group">
                                <i class="ri-calendar-line text-green-600 transition group-hover:rotate-12"></i>
                                Age
                            </div>
                        </th>
                        <th class="p-4 text-left">
                            <div class="flex items-center justify-center gap-2 group">
                                <i class="ri-map-pin-line text-red-500 transition group-hover:animate-bounce"></i>
                                City
                            </div>
                        </th>
                    </tr>
                </thead>

                <!-- Body -->
                <tbody id="tableBody" class="divide-y divide-sky-200 text-center">

                </tbody>

            </table>
        </div>

    </div>

    <script>
        const users = [
            { name: "john", age: 25, city: "london" },
            { name: "sara", age: 22, city: "paris" },
            { name: "mike", age: 30, city: "newyork" },
            { name: "emma", age: 27, city: "berlin" },
            { name: "david", age: 35, city: "tokyo" }
        ]

        const tbody = document.getElementById("tableBody")

        users.forEach((user) => {

            const row = document.createElement("tr")

            row.classList.add("hover:bg-sky-50", "transition")

            const td1 = document.createElement("td")
            const td2 = document.createElement("td")
            const td3 = document.createElement("td")

            td1.classList.add("p-4", "font-medium", "text-slate-800")
            td2.classList.add("p-4", "text-slate-600","font-medium")
            td3.classList.add("p-4", "text-slate-600","font-semibold")

            td1.innerText = user.name
            td2.innerText = user.age
            td3.innerText = user.city

            row.append(td1, td2, td3)
            tbody.appendChild(row)
        })
    </script>

</body>

</html>
